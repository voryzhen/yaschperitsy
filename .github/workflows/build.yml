name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [ main ]

jobs:
  macos:
    name: 'macOS'
    runs-on: [ macos-latest ]

    steps:

      - uses: actions/checkout@v2

      - name: Prepare
        run: brew install conan

      - name: Run conan
        run: |
          {
            conan profile detect
            conan install . --build=missing -s compiler.cppstd=gnu20
          }

      - name: Cmake
        run: cmake --preset conan-release

      - name: Compile
        run: cmake --build --preset conan-release

      - name: Pack
        run: |
          {
            mv ./build/Release/yaschperitsy .
            tar -czvf yaschperitsy_macos.tar.gz yaschperitsy assets
          }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: yaschperitsy_macos
          path: yaschperitsy_macos.tar.gz

  windows-msvc:

    name: Windows (MSVC)
    runs-on: [ windows-latest ]

    steps:

      - uses: actions/checkout@v2

      - name: Boost
        run: choco install conan

      - name: Run conan
        run: |
          {
            conan profile detect
            conan install . --build=missing -s compiler.cppstd=gnu20
            cmake --list-presets > ./myfile.txt
          }

      # - name: Cmake
      #   run: cmake --preset conan-default

      # - name: Compile
      #   run: cmake --build --preset conan-release

      - name: Pack
        run: |
          mkdir yaschperitsy
          mv ./myfile.txt yaschperitsy/

          Compress-Archive -Path ./yaschperitsy -DestinationPath ./yaschperitsy_win.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: yaschperitsy_win
          path: ./yaschperitsy_win.zip
