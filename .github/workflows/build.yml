name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [ main ]

jobs:
  macos:
    name: 'macOS'
    runs-on: [ macos-latest ]

    steps:

      - uses: actions/checkout@v2

      - name: Prepare
        run: brew install SDL2 SDL2_image SDL2_ttf boost

      - name: Compile
        run: |
          {
            mkdir build
            cd build
            cmake ..
            cmake --build .
          }

      - name: Test
        run: ./build/yaschperitsy_test

      - name: Pack
        run: |
          {
            mv ./build/yaschperitsy .
            tar -czvf yaschperitsy_macos.tar.gz yaschperitsy assets
          }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: yaschperitsy_macos
          path: yaschperitsy_macos.tar.gz

  windows-msvc:

    name: Windows (MSVC)
    runs-on: [ windows-latest ]

    steps:

      - uses: actions/checkout@v2

      - name: Download SDLs
        run: |
          curl.exe -JLO https://github.com/libsdl-org/SDL/releases/download/release-2.30.3/SDL2-devel-2.30.3-VC.zip
          curl.exe -JLO https://github.com/libsdl-org/SDL_image/releases/download/release-2.8.2/SDL2_image-devel-2.8.2-VC.zip
          curl.exe -JLO https://github.com/libsdl-org/SDL_ttf/releases/download/release-2.22.0/SDL2_ttf-devel-2.22.0-VC.zip
          Expand-Archive ./SDL2-devel-2.30.3-VC.zip -DestinationPath ./SDL2
          Expand-Archive ./SDL2_image-devel-2.8.2-VC.zip -DestinationPath ./SDL2_image
          Expand-Archive ./SDL2_ttf-devel-2.22.0-VC.zip -DestinationPath ./SDL2_ttf

#      - name: Boost
#        run: choco install boost-msvc-14.2

      - name: Cmake
        run: |
          mkdir build
          cd build
          cmake .. -DSDL2_INCLUDE_DIRS="./SDL2/SDL2-2.30.3/include;./SDL2_image/SDL2_image-2.8.2/include;./SDL2_ttf/SDL2_ttf-2.22.0/include" -DSDL2_LIBRARIES="SDL2;SDL2main;SDL2_image;SDL2_ttf" -DSDL2_LIB_DIRS="./SDL2/SDL2-2.30.3/lib/x64;./SDL2_image/SDL2_image-2.8.2/lib/x64;./SDL2_ttf/SDL2_ttf-2.22.0/lib/x64"
          cmake --build .

      - name: Pack
        run: |
          mkdir yaschperitsy
          mv ./build/Debug/yaschperitsy.exe yaschperitsy/
          mv ./assets yaschperitsy/

          mv ./SDL2/SDL2-2.30.3/lib/x64/SDL2.dll yaschperitsy/
          mv ./SDL2_image/SDL2_image-2.8.2/lib/x64/SDL2_image.dll yaschperitsy/
          mv ./SDL2_ttf/SDL2_ttf-2.22.0/lib/x64/SDL2_ttf.dll yaschperitsy/

          Compress-Archive -Path ./yaschperitsy -DestinationPath ./yaschperitsy_win.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: yaschperitsy_win
          path: ./yaschperitsy_win.zip
